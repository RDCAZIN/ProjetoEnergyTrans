<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Home Usuário
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for(
            'static',
            filename='css/home_usuario.css'
        ) }}"
    >

</head>

<body>

    <div class="container">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <!-- CONTEÚDO SUPERIOR -->

            <div class="sidebar-top">

                <!-- LOGO -->

                <h1 class="logo">

                    <span class="energy">ENERGY</span><span class="trans">TRANS</span>

                </h1>

                <!-- LOCALIZAÇÃO -->

                <div class="localizacao">

                    <h3>
                        Sua localização
                    </h3>

                    <div class="box-localizacao">

                        <p>
                            Manaus - AM
                        </p>

                    </div>

                </div>

                <!-- LEGENDA -->

                <div class="legenda">

                    <h3>
                        Pontos de coleta
                    </h3>

                    <div class="item-legenda">

                        <div class="bolinha verde">

                        </div>

                        <p>
                            Pontos disponíveis
                        </p>

                    </div>

                </div>

            </div>

            <!-- MENU -->

            <nav class="menu">

                <a href="">
                    Mapa
                </a>

                <a href="">
                    Histórico
                </a>

                <a href="">
                    Cupons
                </a>

                <a href="">
                    Agendamentos
                </a>

            </nav>

        </aside>

        <!-- ÁREA DO MAPA -->

        <main class="mapa-area">

            <!-- MAPA -->

            <div class="mapa">

                {{ mapa|safe }}

            </div>

            <!-- CARD DINÂMICO -->

            <div
                class="card-ponto"
                id="card-ponto"
            >

                <h2 id="nome-ponto">

                    Clique em um ponto

                </h2>

                <p id="endereco-ponto">

                </p>

                <p id="materiais-ponto">

                </p>

                <p id="horario-ponto">

                </p>

                <button id="btn-detalhes">

                    Ver detalhes

                </button>

                <button id="btn-agendar">

                    Agendar entrega

                </button>

            </div>
            <!-- MODAL DE AGENDAMENTO -->

            <div
                id="modal-agendamento"
                class="modal-overlay"
                style="display: none;"
            >

                <div class="modal">

                    <!-- BOTÃO FECHAR -->

                    <button id="fechar-modal" class="btn-fechar">✕</button>

                    <h2>
                        Agendar entrega
                    </h2>

                    <form
                        method="POST"
                        action="{{ url_for('main.agendar') }}"
                    >

                        <!-- ID DO PONTO -->

                        <input
                            type="hidden"
                            name="ponto_id"
                            id="ponto-id"
                        >

                        <!-- DATA -->

                        <label>
                            Data
                        </label>

                        <input
                            type="date"
                            name="data_agendada"
                            required
                        >

                        <!-- HORÁRIO -->

                        <label>
                            Horário
                        </label>

                        <input
                            type="time"
                            name="horario"
                            required
                        >

                        <!-- BOTÃO -->

                        <button class="agendar" type="submit">

                            Confirmar agendamento

                        </button>

                    </form>

                </div>

            </div>

        </main>

    </div>

    <!-- DADOS DOS PONTOS -->

    <script>

        const pontos = JSON.parse(
            '{{ pontos_json | safe }}'
        )

    </script>

    <!-- JS -->

    <script
        src="{{ url_for(
            'static',
            filename='js/home_usuario.js'
        ) }}"
    ></script>

</body>

</html>
