<!-- MODAL -->
        <div id="modal-overlay" style="display: none;">

            <div class="modal">

                <h2>
                    Confirmar entrega
                </h2>

                <!-- FORMULÁRIO -->
                <form method="POST" action="{{ url_for('main.confirmar_entrega') }}">

                    <!-- ID DO AGENDAMENTO -->
                    <input type="hidden" name="agendamento_id" id="agendamento-id">

                    <!-- MATERIAL -->
                    <label for="material">

                        Material reciclado

                    </label>

                    <select name="material" id="material" required>

                        <option value="">
                            Selecione
                        </option>

                        <option value="Bateria">
                            Bateria
                        </option>

                        <option value="Painel Solar">
                            Painel Solar
                        </option>

                        <option value="Pilha">
                            Pilha
                        </option>

                        <option value="Eletrônicos">
                            Eletrônicos
                        </option>

                    </select>

                    <!-- PESO -->
                    <label for="peso">

                        Peso reciclado (kg)

                    </label>

                    <input type="number" step="0.1" min="0.1" name="peso" id="peso" required>

                    <!-- BOTÃO SUBMIT -->
                    <button type="submit">

                        Confirmar

                    </button>

                </form>

            </div>

        </div>
